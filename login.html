<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión — Control Financiero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">🏦</span>
      <h2>Control Financiero</h2>
      <p>Empresarial</p>
    </div>

    <div class="auth-panel active">
      <h3 class="auth-title">Bienvenido de nuevo</h3>
      <p class="auth-sub">Ingresa tus credenciales para continuar</p>

      <div class="auth-field">
        <label>Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUsuario" placeholder="Tu usuario" autocomplete="username">
        </div>
      </div>

      <div class="auth-field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)" title="Ver contraseña">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="loginError" class="auth-error" style="display:none"></div>

      <button class="auth-btn" onclick="iniciarSesion()">Iniciar Sesión →</button>

      <!--<p class="auth-switch">
        ¿No tienes cuenta?
        <a href="register.html">Regístrate aquí</a>
      </p> -->
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('cf_sesion')) {
    window.location.href = 'index.html';
  }

  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const esOculta = input.type === 'password';
    input.type = esOculta ? 'text' : 'password';
    btn.innerHTML = esOculta
      ? `<svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  async function iniciarSesion() {
    const usuario = document.getElementById('loginUsuario').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');

    if (!usuario || !password) {
      mostrarError('⚠️ Ingresa usuario y contraseña.');
      return;
    }

    try {
      const response = await fetch('https://control-backend-kappa.vercel.app/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password })
      });

      const data = await response.json();

      if (response.ok) {
        // Guardamos el ID de MongoDB y el nombre
        localStorage.setItem('cf_sesion', JSON.stringify({
          id: data.id,
          nombre: data.nombre
        }));
        window.location.href = 'index.html';
      } else {
        mostrarError('❌ ' + (data.error || 'Credenciales incorrectas'));
      }
    } catch (error) {
      mostrarError('❌ No se pudo conectar con el servidor.');
    }
  }

  function mostrarError(msg) {
    const errEl = document.getElementById('loginError');
    errEl.textContent = msg;
    errEl.style.display = 'block';
    shake(document.querySelector('.auth-card'));
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.4s ease';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });
</script>
</body>
</html>
